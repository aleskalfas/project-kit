# Confinement toolkits — per-tool OS-sandbox allowances, classified by boundary effect.
#
# A toolkit names the sandbox-block allowances one tool (or tool-group) needs to
# work under OS confinement (per ADR-008). Each allowance carries an `effect`:
#   narrowing — makes the box usable without enlarging the agent's reach
#               (a build-cache allowWrite, a needed unix socket). Safe to
#               detect, commit, and auto-apply via `setup autonomy`.
#   widening  — lowers the boundary: a command carved OUT of the box to run
#               unconfined (excludedCommands), or weakened TLS. Explicit
#               per-invocation operator gesture only — never committed, never
#               detected, never applied by setup (ADR-008 rules 3–4).
# The `sandbox accommodate` verb applies a toolkit's narrowing allowances; its
# widening allowances are surfaced as the explicit `sandbox exclude` gesture.
# `detect` globs signal a tool is in use. Backbone ships this set; projects
# extend/override by same-name (the privilege-catalog data pattern).

schema_version: 1

toolkits:
  uv:
    description: The uv Python package/runner — writes its package cache outside the project.
    detect:
      - "uv.lock"
      - "pyproject.toml"
    allowances:
      - kind: allow-write
        effect: narrowing
        value: "~/.cache/uv"
        note: uv's shared package cache; confined writes can't reach it otherwise.

  node:
    description: Node / npm / pnpm — write their shared caches outside the project.
    detect:
      - "package.json"
      - "pnpm-lock.yaml"
      - "package-lock.json"
    allowances:
      - kind: allow-write
        effect: narrowing
        value: "~/.npm"
      - kind: allow-write
        effect: narrowing
        value: "~/.cache/node"

  # NOTE: there is intentionally no `ssh-agent` toolkit. The SSH agent socket
  # path is a per-session HOST fact ($SSH_AUTH_SOCK), not a static value a
  # shipped toolkit can hold (per ADR-010). `setup autonomy` resolves and
  # applies it from the environment; for a one-off, `pkit permissions sandbox
  # accommodate --socket "$SSH_AUTH_SOCK"`.

  gh:
    description: GitHub CLI — Go-based TLS verification fails under macOS Seatbelt; must run outside the box.
    detect:
      - ".github/"
    allowances:
      - kind: exclude-command
        effect: widening
        value: "gh"
        note: >-
          runs gh OUTSIDE the box (full host reach). Needed because gh's TLS
          handshake fails under Seatbelt; not a confinement reduction you should
          accept silently — egress from gh is not bounded by the sandbox.

  docker:
    description: Docker / docker-compose — incompatible with the sandbox; must run outside the box.
    detect:
      - "Dockerfile"
      - "docker-compose.yml"
      - "compose.yaml"
    allowances:
      - kind: exclude-command
        effect: widening
        value: "docker"
        note: >-
          runs docker OUTSIDE the box. docker itself launches containers with
          arbitrary mounts/network — excluding it is a real boundary reduction;
          apply only by the explicit `sandbox exclude` gesture.
