schema_version: 1

# Privilege catalog — the named domain things an agent may be permitted to do
# (per COR-028). Each privilege declares how a request is recognized as
# belonging to it (a structured matcher over Bash commands and/or harness tool
# names, with a regex escape hatch per Q4c) and which scope dimension it accepts.
#
# Namespace owner: permission grants reference privileges via the typed token
# [privilege-catalog:<id>] (COR-019). The baseline catalog content (vcs, docker,
# web-fetch, repo-read, kit, guardrails) is authored against this shape in a
# later task; this file ships the envelope and is extended by capabilities and
# projects that introduce their own tools.

privileges:
  # --- common allow-shaped privileges ---
  vcs:
    description: Git version control.
    recognize:
      bash:
        - cmd: git
  issue-tracker:
    description: GitHub issues and pull requests via the gh CLI.
    recognize:
      bash:
        - cmd: gh
  issue-tracker-write:
    description: >-
      Raw gh mutations that bypass the project-management capability's
      validating scripts (gh issue create/edit/comment/close/reopen and
      gh pr create/edit/merge/close/reopen). Deny to force the validating
      scripts — the matching wrappers (create-issue, edit-issue, close-issue,
      reopen-issue, open-pr, edit-pr, merge-pr, close-pr, reopen-pr) run the
      methodology's gates (validation, checkbox close-gate, approval gate).
      NOTE: this is a speed-bump, not a security boundary — per ADR-004 a
      tool-call denylist is porous (a `bash -c '…'` wrapper or
      `gh api -X PATCH … state=closed` evades it). The genuine gate
      enforcement lives inside the scripts; this only removes the reflexive
      direct-typed bypass.
    recognize:
      bash:
        # Matches the mutating gh subcommands that have validated wrappers:
        # gh issue {create,edit,comment,close,reopen} and
        # gh pr {create,edit,merge,close,reopen}.  Does NOT match reads
        # (gh issue view/list/status, gh pr view/checks/diff) or `gh api`
        # (left open deliberately as the REST escape hatch — and itself a
        # bypass vector, per ADR-004).  Runs on the joined token segment after
        # env-prefix stripping (decide.py segments()), so
        # "export GH_HOST=x && gh issue close …" is handled correctly.
        - pattern: '^gh\s+(issue\s+(create|edit|comment|close|reopen)|pr\s+(create|edit|merge|close|reopen))(\s|$)'
  kit:
    description: Run the project-kit CLI.
    recognize:
      bash:
        - cmd: pkit
  docker:
    description: Run docker / docker-compose.
    recognize:
      bash:
        - cmd: docker
        - cmd: docker-compose
    scope_type: directory
  web-fetch:
    description: Fetch web content.
    recognize:
      tool:
        - WebFetch
        - WebSearch
    scope_type: domain
  repo-read:
    description: Read repository files.
    recognize:
      tool:
        - Read
        - Grep
        - Glob

  # --- guardrail privileges (the baseline model grants these effect:deny) ---
  privilege-escalation:
    description: Privilege escalation via sudo.
    guardrail: true
    recognize:
      bash:
        - cmd: sudo
  destructive-fs:
    description: Recursive filesystem deletion (rm -r/-R/--recursive, any flag form).
    guardrail: true
    recognize:
      bash:
        # Recursive rm in ANY form: -r, -R, --recursive[=...], or a short bundle
        # containing r/R (-rf, -fr, -fR, -Rf, -rfv, ...). A flag_any token list
        # can't express bundles or `--recursive=`, so this uses the regex escape
        # hatch. Bare `rm` / `rm -f <file>` (single-file, non-recursive) is
        # intentionally NOT a guardrail — that is fs-cleanup territory.
        - pattern: '^rm(?=\s).*(\s-[a-zA-Z]*[rR][a-zA-Z]*(\s|$)|\s--recursive)'
  vcs-history-rewrite:
    description: Rewriting published git history (force-push).
    guardrail: true
    recognize:
      bash:
        - cmd: git
          subcommand: [push]
          flag_any: ["--force", "-f", "--force-with-lease"]
