schema_version: 2
component:
  kind: capability
  name: project-management
  version: 0.43.0
description: Project-management discipline realized from the pm-workflow methodology — issue hierarchy, state machine, body validation, naming conventions — encoded as schemas a methodology-agnostic engine (skills + agent) consumes at runtime.
requires_backbone: ">=1.126.0,<2.0.0"
aliases:
  - pm
# Runtime-local files this capability owns under `.pkit/` (ADR-009 Amendment 1).
# Declared repo-root-relative, exactly as `footprint:` is; the renderer rebases
# onto the `.pkit/`-relative form `.pkit/.gitignore` needs. The process journal
# is per-clone audit state, not shared methodology content.
runtime_ignore:
  - .pkit/capabilities/project-management/project/process/**/*.journal.jsonl
commands:
  pre-check:
    script: scripts/pre-check.py
    help: Verify methodology prerequisites are present and configured (read-only diagnostic; hard gate on every pm operation).
  bootstrap:
    script: scripts/bootstrap.py
    help: Create the methodology's required initial GitHub state (labels per classification axes; optionally a starter EPIC).
  migrate:
    script: scripts/migrate.py
    help: Reconcile adopter state after a capability upgrade (per-change confirmation; refuses to run on pre-check failure).
  back-fill:
    script: scripts/back-fill.py
    help: "Corpus back-fill — the auditable propose-and-cite ceremony (per DEC-037 §2 / ADR-031). Default (report) enumerates proposed per-issue non-label substrate writes (Projects-v2 field value; milestone) from the after_create_issue hooks, cites why each is proposed, gates on the residual pre-check subset, and mutates nothing; --json emits the machine-stable plan. --apply drives the reviewed plan to writes under the audited skip/report posture (re-validates each issue at apply time: drift→skip, already-set→skip; confirmation-gated, --yes for CI; non-zero exit on any write failure). --emit-script emits an idempotent re-checking script the adopter runs themselves (pm writes nothing). --plan <file> applies/emits from a saved --json plan."
  adopt-existing:
    script: scripts/adopt-existing.py
    help: "Brownfield onboarding ceremony — inventory + draft, never apply (per DEC-037 §1). Inventories the live tracker through gh READS only (labels + usage, title-prefix patterns, open/closed + a Blocked convention, Projects-v2 fields, milestones), infers + DRAFTS a candidate substrate-map.yaml, and prints an AUDIT report showing the EVIDENCE for each inferred binding (with coverage/confidence signals) so the human's acceptance is informed, not reflexive. Self-checks the draft against substrate-map.schema.json. Mutates NOTHING — never writes the live map, never edits a label/field/issue, never installs. --out writes the DRAFT to a review file (refuses the live map path); --json emits the inventory+inferences+draft+schema-check machine-readably."
  add-member:
    script: scripts/add-member.py
    help: Add a member to the team-membership roster (per DEC-021). Open mode allows self-add; closed mode requires invoker to be a current member.
  remove-member:
    script: scripts/remove-member.py
    help: Remove a member from the team-membership roster (per DEC-021). Removal landing requires PR review per DEC-021.
  show-members:
    script: scripts/show-members.py
    help: Show the current team-membership roster and resolved invoker identity (read-only).
  create-issue:
    script: scripts/create-issue.py
    help: File a new issue (per DEC-020). Composes title + body from the type's template, applies classification labels, optionally adds to the configured Projects v2 board. Refuses a non-feature --kind on an epic/feature/umbrella up front (the DEC-011 kind/structural hard-reject).
  create-milestone:
    script: scripts/create-milestone.py
    help: File a new Milestone in a declared category (per DEC-016). Computes the next number from existing milestones; composes title from category's title_format; posts to GitHub with the `Close trigger:` body line.
  validate-issue:
    script: scripts/validate-issue.py
    help: Validate an existing GitHub issue against the methodology's body + classification rules — including the DEC-011 kind/structural cross-check (a non-feature type:* label on an epic/feature/umbrella). Findings tagged by severity per validation-severity.yaml.
  show-issue:
    script: scripts/show-issue.py
    help: Show the methodology-relevant view of a GitHub issue (read-only). Surfaces type, classification, assignees, state, parent-ref, required-section summary.
  assign-issue:
    script: scripts/assign-issue.py
    help: Reassign a GitHub issue. Supports --me self-assignment, --assignee for single/multi assignment, --unassign for removal (per DEC-019).
  move-issue:
    script: scripts/move-issue.py
    help: Transition an issue through the lifecycle state machine (per DEC-006). Reads workflow.yaml; cascades parents upward on forward moves.
  close-issue:
    script: scripts/close-issue.py
    help: Close an issue per DEC-006's closure paths. Default mode is wont-do (reason + checkbox close-gate per DEC-007); pr-merge mode runs the post-close cascade.
  reopen-issue:
    script: scripts/reopen-issue.py
    help: Reopen a closed issue; optionally records an audit reason as a comment.
  edit-issue:
    script: scripts/edit-issue.py
    help: Methodology-aware body / title edit. Validates the new state against body-format.yaml + titles.yaml before writing; refuses on hard-reject unless --force.
  check-criterion:
    script: scripts/check-criterion.py
    help: "Tick one or more acceptance-criterion checkboxes on an issue, addressed by 1-based index with an optional expected-text guard (per DEC-038). Batch-capable; validates the whole batch up front and refuses before any mutation on a hard inconsistency (out-of-range / text-mismatch / ambiguous guard); idempotent on re-run."
  uncheck-criterion:
    script: scripts/uncheck-criterion.py
    help: "Untick one or more acceptance-criterion checkboxes on an issue — the symmetric counterpart to check-criterion (per DEC-038). Same index + optional-text-guard addressing, validate-up-front whole-batch hard-reject, and idempotent recovery."
  set-field:
    script: scripts/set-field.py
    help: "Declaratively set an issue's kind / priority / workstream / parent classification field(s) in one batch call (per DEC-038). Reuses create-issue's classification resolution (substrate-map-aware); --kind applies to kind-driven (Task) issues — swaps the type:* label and realigns the title prefix — and refuses a non-feature kind on epic/feature/umbrella (DEC-011); validates up front and refuses before any mutation on an unknown value; idempotent on re-run."
  open-pr:
    script: scripts/open-pr.py
    help: Open a GitHub PR per the methodology's branch + title conventions. Derives the closing issue from the branch name; the Conventional Commits <type> from the issue's type:* label.
  merge-pr:
    script: scripts/merge-pr.py
    help: Merge a PR with squash + delete-branch per git-conventions.yaml. Enforces the DEC-007 checkbox close-gate on every closing issue + the PR body.
  close-pr:
    script: scripts/close-pr.py
    help: Close a PR without merging; optionally records an audit reason and deletes the source branch.
  reopen-pr:
    script: scripts/reopen-pr.py
    help: Reopen a closed (unmerged) PR. Merged PRs are refused.
  validate-pr:
    script: scripts/validate-pr.py
    help: Validate a PR's title (Conventional Commits + type alignment with closing issues) and body (Closes #N, Doc impact section) per titles.yaml + git-conventions.yaml.
  edit-pr:
    script: scripts/edit-pr.py
    help: Methodology-aware edit of a PR's body or title. Validates new state before writing; refuses on hard-reject unless --force.
  show-pr:
    script: scripts/show-pr.py
    help: Read-only view of a GitHub PR — title parse, state, branches, closing issues, reviewers, doc-impact section presence.
  show-tree:
    script: scripts/show-tree.py
    help: PM-operational diagnostic. Walks the hierarchy (EPICs → Features/Umbrellas → Tasks → PRs) and reports orphans. Text / JSON / markdown output.
  add-workstream:
    script: scripts/add-workstream.py
    help: Add a workstream to project/workstreams.yaml (per DEC-018). Validates slug; for label-substrate adopters, creates the workstream:<slug> label.
  show-workstream:
    script: scripts/show-workstream.py
    help: Read-only view of one workstream entry (resolves from workstreams.yaml or config.yaml legacy fallback).
  list-workstreams:
    script: scripts/list-workstreams.py
    help: List every workstream — filterable by status (active/deprecated/all). Surfaces parse errors + duplicate-name warnings.
  edit-workstream:
    script: scripts/edit-workstream.py
    help: Edit an existing workstream's name / description / status / deprecated_reason. Status flips require confirmation per DEC-018.
  rename-workstream:
    script: scripts/rename-workstream.py
    help: Rename a workstream slug. Updates workstreams.yaml + renames the GitHub `workstream:<slug>` label (label-substrate adopters).
  merge-workstream:
    script: scripts/merge-workstream.py
    help: Merge one or more loser workstreams into a survivor. Re-tags issues + deletes loser labels (label-substrate adopters).
  split-workstream:
    script: scripts/split-workstream.py
    help: Split one workstream into 2–5 new slugs (per DEC-018). Default-retag opt-in via --default; without it, issues are flagged for manual retag.
  remove-workstream:
    script: scripts/remove-workstream.py
    help: Remove a workstream. Refuses if any issue still uses the label unless --force. Type-the-slug confirmation prompt.
  check-mesh:
    script: scripts/check-mesh.py
    help: Compare local methodology state against configured mesh peers per DEC-022. Surfaces drift in labels, capability version, members, milestones as warnings. Read-only.
  check-doc-mapping:
    script: scripts/check-doc-mapping.py
    help: "Enforce the code->doc mapping (DEC-015 + ADR-019). Read-only; exits non-zero when a PR's diff touches mapped code without the mapped doc (with enforce: true). Wire as a required CI status check for a real boundary; override a false positive via a `## Doc impact` line."
  promote-issue:
    script: scripts/promote-issue.py
    help: "Workflow wrapper (DEC-026): Todo → Backlog with milestone + audit comment. Composes over move-issue."
  start-work:
    script: scripts/start-work.py
    help: "Workflow wrapper (DEC-026): Backlog → In Progress. Creates branch + sets assignee; composes over move-issue."
  create-draft:
    script: scripts/create-draft.py
    help: "Workflow wrapper (DEC-026): opens a draft PR for an in-progress branch. No issue-state transition."
  review-work:
    script: scripts/review-work.py
    help: "Workflow wrapper (DEC-026): In Progress → Review. Opens ready PR or flips draft→ready; assigns reviewers; composes over move-issue."
  back-to-draft:
    script: scripts/back-to-draft.py
    help: "Workflow wrapper (DEC-026): flips a ready PR back to draft; dismisses prior APPROVED reviews. Issue stays in Review."
  done-work:
    script: scripts/done-work.py
    help: "Workflow wrapper (DEC-026): Review → Done. Squash-merges PR via three-way approval gate (APPROVED review / Approved-prefix comment / --bypass); composes over move-issue."
  handoff-issue:
    script: scripts/handoff-issue.py
    help: "Workflow wrapper (DEC-026): reassign an in-flight issue to a new owner. Audit comment records the handoff; no state transition."
  review-pr:
    script: scripts/review-pr.py
    help: "Local-agent review (DEC-028): invokes every locally-registered agent against the PR diff and posts each verdict as a comment. Sibling to the DEC-026 lifecycle palette."
  self-test:
    script: scripts/self-test.py
    help: "Smoke-test the capability's core transition cycle on the live repo. Creates a throwaway issue, advances it through the state machine, and closes it. Use --dry-run to preview without mutating."
  detect-todo:
    script: scripts/detect-todo.py
    help: "Process detection predicate (DEC-033): read-only; reports whether an issue's inferred lifecycle position is Todo. Invoked by the process engine."
  detect-backlog:
    script: scripts/detect-backlog.py
    help: "Process detection predicate (DEC-033): read-only; reports whether an issue's inferred lifecycle position is Backlog. Invoked by the process engine."
  detect-in-progress:
    script: scripts/detect-in-progress.py
    help: "Process detection predicate (DEC-033): read-only; reports whether an issue's inferred lifecycle position is In Progress. Invoked by the process engine."
  detect-review:
    script: scripts/detect-review.py
    help: "Process detection predicate (DEC-033): read-only; reports whether an issue's inferred lifecycle position is Review. Invoked by the process engine."
  detect-done:
    script: scripts/detect-done.py
    help: "Process detection predicate (DEC-033): read-only; reports whether an issue's inferred lifecycle position is Done. Invoked by the process engine."
  gate-checkboxes-ticked:
    script: scripts/gate-checkboxes-ticked.py
    help: "Process gate predicate (DEC-033 / DEC-007): read-only deterministic close-gate; result=True iff the issue body has no unticked checkbox. Invoked by the process engine."
  gate-pr-merged:
    script: scripts/gate-pr-merged.py
    help: "Process gate predicate (DEC-033): read-only authorisation-artifact; reports {exists, produced_by} for a merged PR closing the issue (the engine computes cross-authority). Invoked by the process engine."
  parent-active-descendant:
    script: scripts/parent-active-descendant.py
    help: "Process predicate (DEC-033): read-only pm-local descendant walk; reports whether an issue has an in-progress-or-further child. Never used by the engine for position; consulted by cascade logic."
  cascade-members:
    script: scripts/cascade-members.py
    help: "Cascade members source (DEC-034 / COR-037): read-only; returns {members: [...]} — every child of the parent issue (the closure-fold candidate set). Invoked by the process engine."
  cascade-membership:
    script: scripts/cascade-membership.py
    help: "Cascade membership test (DEC-034 / COR-037): read-only; result=True iff the candidate issue declares a parent-ref (a hierarchy member). Invoked by the process engine, one subject at a time."
  enable-default-agent:
    script: scripts/enable-default-agent.py
    help: "Activate the project-manager default-agent overlay for the claude-code harness (per DEC-030). Copies the capability-shipped overlay template to adopter-owned state and re-runs pkit sync."
  disable-default-agent:
    script: scripts/disable-default-agent.py
    help: "Deactivate the project-manager default-agent overlay; strips the agent key from .claude/settings.json, removes the live overlay file, and re-runs pkit sync (per DEC-030)."
