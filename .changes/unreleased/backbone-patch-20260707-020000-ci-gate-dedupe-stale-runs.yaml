component: backbone
kind: patch
category: Fixed
pr: 504
body: >
  `pkit release merge`'s CI gate now dedupes a PR's check rollup to the latest
  run per check before deciding pass or fail. GitHub keeps every run of a check,
  so one that failed and was then re-run green (a fix-and-repush, a label
  re-trigger) previously left a stale failure that wrongly refused the merge; the
  gate now agrees with what `gh pr checks` reports.
