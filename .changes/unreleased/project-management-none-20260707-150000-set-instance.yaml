component: project-management
kind: none
body: >
  Task #518 (Feature #510) adds the `set-instance` command and its clone-local
  identity reader (_lib/instance_identity, DEC-035 point 1): the opt-in, per-clone
  numeric id the instance-ownership feature keys on, written to a git-ignored
  runtime file. The command works standalone (set / --show / --clear), but nothing
  reads the id yet — the claim/guard/listing wiring that makes instance ownership
  observable lands in later #510 Tasks (#519-#521). Declared `none`; the `minor`
  lands with the wiring. No changelog line.
