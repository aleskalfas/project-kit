component: backbone
kind: patch
category: Fixed
body: >
  `pkit capabilities register` no longer refuses an already-registered capability
  outright: it now branches on origin. An entry registered as `incubated-in-repo`
  is a clean no-op, and one registered `kit-shipped` — including the origin-unset
  default a manual registration leaves behind — is adopted in place: the origin is
  set to `incubated-in-repo` on the existing registry entry (no re-copy, no
  re-deploy) so `pkit sync` stops reconciling it against kit source. `--dry-run`
  shows the change without writing.
