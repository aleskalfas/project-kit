component: project-management
kind: minor
category: Added
body: >
  The merge paths (`done-work` and `merge-pr`) now enforce a CI-status gate in
  front of the merge (#498): the PR's `statusCheckRollup` must be green, else
  the merge is refused, naming the failing or still-pending checks. Closes the
  hole where an APPROVED reviewer verdict merged a PR whose CI was red (PR
  #496). A non-green check is bypassable-with-audit via a dedicated
  `--bypass-ci "<reason>"` flag on both scripts, which posts an audit comment
  to the PR before merging; a non-green check with no `--bypass-ci` is a hard
  refuse. The CI override is deliberately separate from `done-work`'s general
  `--bypass` (approval gate) so overriding a flaky reviewer never silently
  lands a red CI — a merge blocked on both gates needs both flags.
