component: backbone
kind: patch
category: Fixed
pr: 503
body: >
  The changeset guard now exempts a release PR — a diff that is exactly
  `pkit release apply`'s footprint (version bumps, an updated CHANGELOG, and the
  consumed changesets deleted) passes with no `skip-changeset` label, because it
  is the release of already-declared changes, not a new surface change. A stray
  file outside that footprint keeps the guard firing, so the exemption never
  smuggles real surface through.
