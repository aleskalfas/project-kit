component: backbone
kind: minor
body: Fold the `pkit-router` shim's CWD-aware routing into the installed `pkit` entry point (ADR-039). The binary now routes per CWD and pin before loading the CLI — running a source checkout's working tree, an adopter's pinned version under `uvx` (degrading loudly to self on an unresolvable pin), or itself — so adopters and contributors share one install. Retires `scripts/pkit-router` and the `pkit:router-install` task; ships a migration nudging any stale dev-machine shim off PATH.
