name: checks

# The unbypassable backstop + Linux / clean-env / post-merge coverage that a
# local pre-push hook structurally can't give. Runs the SAME aggregator the
# pre-push hook runs (scripts/check.sh) — one source of truth, no drift.
# Replaces the former migrations-check + schemas-validate workflows (both are
# now steps inside the aggregator).

on:
  pull_request:
    branches: [main]
    # `labeled`/`unlabeled` so the changeset guard's `skip-changeset` escape
    # hatch actually re-runs the check when the label is added/removed.
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history so the migration-diff base ref resolves)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install project (clean resolve)
        run: uv sync

      - name: Run the check aggregator
        env:
          # PR: diff against the PR base. Push to main: against main (no-op diff).
          PKIT_CHECK_BASE: origin/${{ github.event.pull_request.base.ref || 'main' }}
        run: ./scripts/check.sh

      # Surface-without-changeset guard (PRJ-002). PR-scoped: it needs the PR
      # base ref and the PR labels (the `skip-changeset` escape hatch), neither
      # of which a local pre-push hook has — so it lives here, not in
      # scripts/check.sh. Escape hatches: a `none` changeset for the component,
      # or the `skip-changeset` label (surfaced below as PKIT_CHANGESET_SKIP).
      #
      # Release PRs (`release/*` head from release-pr.yml) are skipped here as a
      # belt: their diff is exactly `pkit release apply`'s footprint (version
      # bumps + CHANGELOG + the changesets it just consumed), which would trip
      # the guard with no changeset present. The guard *also* self-exempts that
      # diff shape (release.py `is_release_diff`) — the primary, self-contained
      # check — so this `if:` guard is defence-in-depth, not the sole line.
      - name: Changeset guard (surface change ⇒ changeset)
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release/')
        env:
          PKIT_CHANGESET_SKIP: ${{ contains(github.event.pull_request.labels.*.name, 'skip-changeset') && '1' || '' }}
        run: uv run pkit release check --base "origin/${{ github.event.pull_request.base.ref }}"
