# Local-first task runner for project-kit.
#
# Bootstrap chain: mise provisions uv (the one tool pinned below); uv then
# installs the Python interpreter per `requires-python` in pyproject.toml and
# syncs dependencies. So a bare machine with only mise reaches a working tree
# with `mise trust && uv sync`.
#
# Python is intentionally NOT pinned here — `requires-python` in pyproject.toml
# is the single source of truth for the interpreter version. Pinning it in both
# places would invite drift.
#
# Adopters who already use mise pick up the pattern. Adopters who don't can run
# the underlying `uv run ...` commands directly.

[tools]
uv = "latest"
# changie: contributor convenience for authoring changeset files (PRJ-002 D1).
# DEV-ONLY and adopter-invisible — never bundled in the wheel, never a runtime
# dependency, never required to install or use pkit. Changesets are equally
# hand-writable; `pkit release` reads the FILE, not the tool.
changie = "latest"

[tasks.changeset]
description = "Author a changeset declaring version intent (PRJ-002; wraps `changie new`)"
run = "changie new"

[tasks.test]
description = "Run the test suite (pytest)"
run = "uv run pytest"

[tasks.lint]
description = "Lint the source tree (ruff)"
run = "uv run ruff check ."

[tasks.format]
description = "Format the source tree (ruff)"
run = "uv run ruff format ."

[tasks."format:check"]
description = "Check formatting without writing (ruff)"
run = "uv run ruff format --check ."

[tasks.typecheck]
description = "Type-check the source tree (pyright)"
run = "uv run pyright"

[tasks.check]
description = "Run all checks (lint + format:check + typecheck + test)"
depends = ["lint", "format:check", "typecheck", "test"]

# --- pkit install + routing (one install for everyone) ----------------------
# There is ONE install: the global pkit release (PRJ-004). It routes itself per
# CWD and pin (ADR-039) — inside a project-kit source checkout it runs THAT
# checkout's working tree (via the PRJ-001 dispatcher); in an adopter that pins
# a different version it runs that pinned wheel; otherwise it runs itself. No
# separate router shim to install. `pkit:which` diagnoses the wiring.

[tasks."pkit:pinned-install"]
description = "Install/refresh the global pkit release (PRJ-004) — routes natively per ADR-039"
quiet = true
run = '''
set -euo pipefail
target="$(uv tool dir --bin 2>/dev/null || echo "${UV_TOOL_BIN_DIR:-${XDG_BIN_HOME:-$HOME/.local/bin}}")/pkit"
# Clear a stray symlink (e.g. a legacy dev symlink) before installing.
if [ -L "$target" ]; then echo "Removing stray symlink: $target"; rm "$target"; fi
uv tool install --force git+ssh://git@github.com/aleskalfas/project-kit.git
echo "Done. Global release at $target (routes per CWD + pin). Verify with: mise run pkit:which"
'''

[tasks."pkit:which"]
description = "Diagnose pkit routing: active binary, its version, the global install, this checkout"
quiet = true
run = '''
binver() { "$1" version 2>/dev/null | awk '{print $NF}'; }   # version of a direct binary
p="$(command -v pkit || true)"
echo "bare 'pkit' resolves to : ${p:-<none>}"
[ -n "$p" ] && ls -l "$p"
if [ -n "${PKIT_PINNED_BIN:-}" ]; then pinned="$PKIT_PINNED_BIN"; else pinned="$(uv tool dir --bin 2>/dev/null || echo "${UV_TOOL_BIN_DIR:-${XDG_BIN_HOME:-$HOME/.local/bin}}")/pkit"; fi
if [ -x "$pinned" ]; then echo "global install          : $pinned  ->  pkit $(binver "$pinned")"; else echo "global install          : $pinned  ->  MISSING (run pkit:pinned-install)"; fi
echo "this checkout (dev)     : backbone $(cat "{{config_root}}/.pkit/VERSION" 2>/dev/null)  <- what bare 'pkit' runs from here (route 1)"
'''
